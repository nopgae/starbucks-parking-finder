services:
  postgres:
    image: postgres:16-alpine
    container_name: starbucks-parking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking123
      POSTGRES_DB: starbucks_parking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking -d starbucks_parking"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: starbucks-parking-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://parking:parking123@postgres:5432/starbucks_parking
      PORT: 3000
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      NAVER_SEARCH_CLIENT_ID: ${NAVER_SEARCH_CLIENT_ID}
      NAVER_SEARCH_CLIENT_SECRET: ${NAVER_SEARCH_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
